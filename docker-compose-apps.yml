version: '3.8'

services:
  opencrawling-backend:
    build:
      context: .
      dockerfile: oc-runtime/Dockerfile
    image: opencrawling-backend:latest
    container_name: opencrawling-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis-stack
      - SPRING_DATA_REDIS_PASSWORD=redis_password
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_VECTORSTORE_PGVECTOR_URL=jdbc:postgresql://postgres-vector:5432/opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_USERNAME=opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_PASSWORD=opencrawling_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
    networks:
      - opencrawling-network
    restart: unless-stopped

  opencrawling-frontend:
    build:
      context: ./oc-admin-ui
      dockerfile: Dockerfile
    image: opencrawling-frontend:latest
    container_name: opencrawling-frontend
    ports:
      - "3000:80"
    depends_on:
      - opencrawling-backend
    networks:
      - opencrawling-network
    restart: unless-stopped

networks:
  opencrawling-network:
    name: opencrawling-network
    external: true
