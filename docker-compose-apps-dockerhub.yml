services:
  opencrawling-backend:
    image: opencrawling/opencrawling-backend:latest
    container_name: opencrawling-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis-stack
      - SPRING_DATA_REDIS_PASSWORD=redis_password
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_VECTORSTORE_PGVECTOR_URL=jdbc:postgresql://postgres-vector:5432/opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_USERNAME=opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_PASSWORD=opencrawling_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_OPENCRAWLING_CLAIM_CHECK_OZONE_S3_ENDPOINT=http://s3g:9878
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://otel-collector:4318/v1/traces
      - OPENCRAWLING_OBSERVABILITY_ENABLED=true
      - OPENCRAWLING_OBSERVABILITY_SAMPLING_PROBABILITY=1.0
    networks:
      - opencrawling-network
    restart: unless-stopped

  opencrawling-embedding:
    image: opencrawling/opencrawling-embedding:latest
    container_name: opencrawling-embedding
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_OPENAI_API_KEY=mock-key
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://otel-collector:4318/v1/traces
      - OPENCRAWLING_OBSERVABILITY_ENABLED=true
      - OPENCRAWLING_OBSERVABILITY_SAMPLING_PROBABILITY=1.0
    depends_on:
      - opencrawling-backend
    networks:
      - opencrawling-network
    restart: unless-stopped

  opencrawling-frontend:
    image: opencrawling/opencrawling-frontend:latest
    container_name: opencrawling-frontend
    ports:
      - "3000:80"
    depends_on:
      - opencrawling-backend
    networks:
      - opencrawling-network
    restart: unless-stopped

networks:
  opencrawling-network:
    name: opencrawling-network
    external: true
