services:
  # --- Infrastructure Services ---
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres-vector-decoupled
    environment:
      POSTGRES_USER: opencrawling
      POSTGRES_PASSWORD: opencrawling_password
      POSTGRES_DB: opencrawling
    ports:
      - "5432:5432"
    volumes:
      - opencrawling-pgdata:/var/lib/postgresql/data
    networks:
      - opencrawling-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencrawling"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:7.4.0-v8
    container_name: redis-stack-decoupled
    environment:
      REDIS_ARGS: "--requirepass redis_password"
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - opencrawling-redisdata:/data
    networks:
      - opencrawling-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:0.23.4
    container_name: ollama-decoupled
    ports:
      - "11434:11434"
    volumes:
      - opencrawling-ollamadata:/root/.ollama
    networks:
      - opencrawling-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama-model-puller:
    image: ollama/ollama:0.23.4
    container_name: ollama-model-puller-decoupled
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=ollama:11434
    networks:
      - opencrawling-network
    depends_on:
      ollama:
        condition: service_healthy
    command: -c "ollama pull mxbai-embed-large && ollama pull nomic-embed-text && ollama pull all-minilm"

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-decoupled
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9094,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9094,EXTERNAL://127.0.0.1:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "9092:9092"
    volumes:
      - opencrawling-kafkadata:/var/lib/kafka/data
    networks:
      - opencrawling-network

  # --- Decoupled OpenCrawling Services ---
  oc-crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.crawler
    image: ghcr.io/opencrawling/oc-crawler:latest
    container_name: oc-crawler-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_OPENCRAWLING_CRAWL_ON_STARTUP=true
      - SPRING_OPENCRAWLING_SCAN_PATH=/data
      - SPRING_AI_VECTORSTORE_PGVECTOR_URL=jdbc:postgresql://postgres:5432/opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_USERNAME=opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_PASSWORD=opencrawling_password
      - SPRING_MAIN_WEB_APPLICATION_TYPE=none
    volumes:
      - ./oc-runtime/data:/data  # Mount sample files directory
    depends_on:
      - kafka
      - postgres
    networks:
      - opencrawling-network
    restart: on-failure

  oc-ingestion-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion-consumer
    image: ghcr.io/opencrawling/oc-ingestion-consumer:latest
    container_name: oc-ingestion-consumer-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_AI_VECTORSTORE_PGVECTOR_URL=jdbc:postgresql://postgres:5432/opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_USERNAME=opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_PASSWORD=opencrawling_password
    volumes:
      - ./oc-runtime/data:/data  # Needs access to resolve local claim check file URIs
    depends_on:
      - kafka
      - postgres
    networks:
      - opencrawling-network
    restart: unless-stopped

  oc-embedding-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.embedding-consumer
    image: ghcr.io/opencrawling/oc-embedding-consumer:latest
    container_name: oc-embedding-consumer-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_VECTORSTORE_PGVECTOR_URL=jdbc:postgresql://postgres:5432/opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_USERNAME=opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_PASSWORD=opencrawling_password
      - SPRING_AI_OPENAI_API_KEY=mock-key
    depends_on:
      - kafka
      - ollama
      - postgres
    networks:
      - opencrawling-network
    restart: unless-stopped

  oc-writer-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.writer-consumer
    image: ghcr.io/opencrawling/oc-writer-consumer:latest
    container_name: oc-writer-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_AI_VECTORSTORE_PGVECTOR_URL=jdbc:postgresql://postgres:5432/opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_USERNAME=opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_PASSWORD=opencrawling_password
    depends_on:
      - kafka
      - postgres
    networks:
      - opencrawling-network
    restart: unless-stopped

  oc-mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-server
    image: ghcr.io/opencrawling/oc-mcp-server:latest
    container_name: oc-mcp-server-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_AI_VECTORSTORE_PGVECTOR_URL=jdbc:postgresql://postgres:5432/opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_USERNAME=opencrawling
      - SPRING_AI_VECTORSTORE_PGVECTOR_PASSWORD=opencrawling_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=redis_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
    depends_on:
      - postgres
      - redis
    networks:
      opencrawling-network:
        aliases:
          - opencrawling-backend
    restart: unless-stopped

  oc-admin-ui:
    build:
      context: ./oc-admin-ui
      dockerfile: Dockerfile
    image: ghcr.io/opencrawling/oc-admin-ui:latest
    container_name: oc-admin-ui-service
    ports:
      - "3000:80"
    depends_on:
      - oc-mcp-server
    networks:
      - opencrawling-network
    restart: unless-stopped

networks:
  opencrawling-network:
    name: opencrawling-network
    driver: bridge

volumes:
  opencrawling-pgdata:
    name: opencrawling-pgdata
  opencrawling-redisdata:
    name: opencrawling-redisdata
  opencrawling-ollamadata:
    name: opencrawling-ollamadata
  opencrawling-kafkadata:
    name: opencrawling-kafkadata
