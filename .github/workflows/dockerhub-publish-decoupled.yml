name: Publish Decoupled Docker Hub Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOCKERHUB_ORG: opencrawling

jobs:
  build-and-push-decoupled-dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        component: [crawler, ingestion-consumer, embedding-consumer, writer-consumer, mcp-server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract metadata (tags, labels) for the specific matrix component
      - name: Extract metadata for ${{ matrix.component }}
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.DOCKERHUB_ORG }}/oc-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      # Build and push the decoupled component image to Docker Hub
      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
