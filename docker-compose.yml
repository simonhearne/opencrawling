services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres-vector
    environment:
      POSTGRES_USER: opencrawling
      POSTGRES_PASSWORD: opencrawling_password
      POSTGRES_DB: opencrawling
    ports:
      - "5432:5432"
    volumes:
      - opencrawling-pgdata:/var/lib/postgresql/data
    networks:
      - opencrawling-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencrawling"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:7.4.0-v8
    container_name: redis-stack
    environment:
      REDIS_ARGS: "--requirepass redis_password"
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - opencrawling-redisdata:/data
    networks:
      - opencrawling-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:0.23.4
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - opencrawling-ollamadata:/root/.ollama
    networks:
      - opencrawling-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama-model-puller:
    image: ollama/ollama:0.23.4
    container_name: ollama-model-puller
    environment:
      - OLLAMA_HOST=ollama:11434
    networks:
      - opencrawling-network
    depends_on:
      ollama:
        condition: service_healthy
    command: pull mxbai-embed-large

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9094,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9094,EXTERNAL://127.0.0.1:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "9092:9092"
    volumes:
      - opencrawling-kafkadata:/var/lib/kafka/data
    networks:
      - opencrawling-network

  # --- Apache Ozone Object Storage (Claim Check Store) ---
  ozone-scm:
    image: apache/ozone:2.2.0
    container_name: ozone-scm
    hostname: scm
    environment:
      OZONE-SITE.XML_ozone.scm.client.address: scm
      OZONE-SITE.XML_ozone.om.address: om
    command: ["ozone", "scm"]
    networks:
      - opencrawling-network

  ozone-om:
    image: apache/ozone:2.2.0
    container_name: ozone-om
    hostname: om
    environment:
      OZONE-SITE.XML_ozone.scm.client.address: scm
      OZONE-SITE.XML_ozone.om.address: om
    command: ["ozone", "om"]
    depends_on:
      - ozone-scm
    networks:
      - opencrawling-network

  ozone-datanode:
    image: apache/ozone:2.2.0
    container_name: ozone-datanode
    environment:
      OZONE-SITE.XML_ozone.scm.client.address: scm
      OZONE-SITE.XML_ozone.om.address: om
    command: ["ozone", "datanode"]
    depends_on:
      - ozone-scm
      - ozone-om
    networks:
      - opencrawling-network

  ozone-s3g:
    image: apache/ozone:2.2.0
    container_name: ozone-s3g
    hostname: s3g
    ports:
      - "9878:9878"
    environment:
      OZONE-SITE.XML_ozone.scm.client.address: scm
      OZONE-SITE.XML_ozone.om.address: om
    command: ["ozone", "s3g"]
    depends_on:
      - ozone-scm
      - ozone-om
      - ozone-datanode
    networks:
      - opencrawling-network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
    networks:
      - opencrawling-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
    networks:
      - opencrawling-network

  prometheus:
    image: prom/prometheus:v2.51.1
    container_name: prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - opencrawling-network

networks:
  opencrawling-network:
    name: opencrawling-network
    driver: bridge

volumes:
  opencrawling-pgdata:
    name: opencrawling-pgdata
  opencrawling-redisdata:
    name: opencrawling-redisdata
  opencrawling-ollamadata:
    name: opencrawling-ollamadata
  opencrawling-kafkadata:
    name: opencrawling-kafkadata
